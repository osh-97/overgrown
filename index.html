<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preload" href="video.mp4" as="video">
  <link rel="preload" href="TOUR DATES.png" as="image">
  <link rel="preload" href="TOUR DATES 2.png" as="image">
  <link rel="preload" href="COVER ART.jpg" as="image">
  <link rel="preload" href="tracklist.png" as="image">
  <link rel="preload" href="FRAME.png" as="image">
  <link rel="preload" href="LOGO.png" as="image">

  <style>
    :root {
      --bg: #000;
      --fg: #f4f1e8;
      --logo-pulse: 0;
      --logo-jitterY: 0px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 0;
      overflow-x: hidden;
    }

    .site {
      position: relative;
      width: min(100vw, 1600px);
      aspect-ratio: 16 / 9;
      background: #000;
      overflow: hidden;
      opacity: 0;
      transition: opacity 180ms ease;
    }

    .site.is-ready {
      opacity: 1;
    }

    .tour-stage {
      position: absolute;
      z-index: 2;
    }

    .tour-stage.left {
      left: 1.5%;
      top: 33%;
      width: 37%;
      aspect-ratio: 2 / 1;
    }

    .tour-stage.right {
      right: 1.5%;
      top: 33%;
      width: 37%;
      aspect-ratio: 2 / 1;
    }

    .base-image {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .hitbox {
      position: absolute;
      padding: 0;
      margin: 0;
      background: transparent;
      border: 0;
      outline: none;
      box-shadow: none;
      cursor: pointer;
      z-index: 10;
      appearance: none;
      -webkit-appearance: none;
    }

    .hitbox:hover,
    .hitbox:focus,
    .hitbox:focus-visible,
    .hitbox.active {
      background: transparent;
      border: 0;
      outline: none;
      box-shadow: none;
    }

    .center-logo {
      position: absolute;
      top: 3.5%;
      left: 50%;
      transform: translateX(-50%);
      width: 28%;
      z-index: 3;
    }

    .center-album {
      position: absolute;
      top: 37%;
      left: 50%;
      transform: translateX(-50%);
      width: 23%;
      z-index: 0;
      pointer-events: none;
    }

    .center-album img {
      display: block;
      width: 100%;
      height: auto;
    }

    .center-tracklist {
      position: absolute;
      top: 81%;
      left: 50%;
      transform: translateX(-50%);
      width: 23%;
      z-index: 3;
      pointer-events: none;
    }

    .center-tracklist img {
      display: block;
      width: 100%;
      height: auto;
    }

    #globalOverlayLayer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
    }

    #globalOverlay {
      position: absolute;
      display: none;
      object-fit: contain;
      pointer-events: none;
    }

    #globalOverlay.visible {
      display: block;
    }

    .logo-scene {
      position: relative;
      width: 100%;
      display: grid;
      place-items: center;
      background: transparent;
    }

    .logo-tv {
      position: relative;
      width: 100%;
      aspect-ratio: 2048 / 1172;
      filter: drop-shadow(0 18px 36px rgba(0,0,0,0.55));
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .logo-screen {
      position: absolute;
      left: 11.8%;
      top: 8.45%;
      width: 80.78%;
      height: 75.85%;
      overflow: hidden;
      clip-path: ellipse(50% 50% at 50% 50%);
      border-radius: 50% / 50%;
      background: #000;
      transform: perspective(900px) rotateX(2.2deg) scale(1.005, 1.02);
      transform-origin: center;
      box-shadow:
        inset 0 0 38px rgba(0,0,0,0.58),
        inset 0 0 6px rgba(255,255,255,0.10),
        inset 0 10px 22px rgba(255,255,255,0.05),
        inset 0 -16px 26px rgba(0,0,0,0.28);
    }

    .logo-screen::before,
    .logo-screen::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .logo-screen::before {
      background:
        radial-gradient(120% 85% at 50% 12%, rgba(255,255,255,0.08), rgba(255,255,255,0) 36%),
        radial-gradient(120% 90% at 50% 118%, rgba(0,0,0,0.20), rgba(0,0,0,0) 34%),
        radial-gradient(140% 100% at 50% 50%, rgba(255,255,255,0) 68%, rgba(0,0,0,0.16) 100%);
      mix-blend-mode: screen;
      opacity: 80;
    }

    .logo-screen::after {
      background: radial-gradient(ellipse at center,
        rgba(255,255,255,0) 58%,
        rgba(255,255,255,0.03) 72%,
        rgba(0,0,0,0.18) 100%);
      mix-blend-mode: soft-light;
    }

    .logo-wrap {
      position: absolute;
      inset: 0;
      transform: translateY(var(--logo-jitterY)) scale(1.08, 1.06);
      overflow: hidden;
      background: #000;
    }

    .logo-video { display: none; }

    .logo-rgb,
    .logo-fx,
    .logo-grade,
    .logo-vignette,
    .logo-crt-glass {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .logo-rgb {
      filter:
        blur(0.8px)
        contrast(1.07)
        saturate(1.12)
        hue-rotate(-10deg)
        brightness(calc(1 + (var(--logo-pulse) * 0.12)));
    }

    .logo-fx {
      pointer-events: none;
      mix-blend-mode: overlay;
      opacity: 0.95;
    }

    .logo-vignette {
      pointer-events: none;
      background: radial-gradient(ellipse at center,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,0.14) 58%,
        rgba(0,0,0,0.35) 78%,
        rgba(0,0,0,0.72) 100%);
      mix-blend-mode: multiply;
    }

    .logo-grade {
      pointer-events: none;
      background:
        linear-gradient(90deg,
          rgba(255,200,120,0.05),
          rgba(0,255,210,0.04),
          rgba(160,255,220,0.03)
        );
      mix-blend-mode: soft-light;
      opacity: 0.9;
    }

    .logo-crt-glass {
      pointer-events: none;
      background:
        radial-gradient(70% 36% at 30% 18%, rgba(255,255,255,0.16), rgba(255,255,255,0) 42%),
        radial-gradient(46% 22% at 72% 28%, rgba(255,255,255,0.08), rgba(255,255,255,0) 55%),
        linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0) 18%, rgba(0,0,0,0.08) 100%);
      mix-blend-mode: screen;
      opacity: 80;
    }

    .logo-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      z-index: 3;
    }

    .logo-frame-under-mask {
      position: absolute;
      left: 11.8%;
      top: 8.45%;
      width: 80.78%;
      height: 75.85%;
      overflow: hidden;
      clip-path: ellipse(50% 50% at 50% 50%);
      border-radius: 50% / 50%;
      z-index: 2;
      pointer-events: none;
    }

    .logo-frame-under-mask::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center,
        rgba(0,0,0,0) 70%,
        rgba(0,0,0,0.35) 100%);
      mix-blend-mode: multiply;
    }

    .logo-frame-under-wrap {
      position: absolute;
      inset: 0;
      transform: translateY(0);
      opacity: 1;
      will-change: transform, opacity;
      transition:
        transform 10s cubic-bezier(0.3, 0.4, 0.6, 1),
        opacity 0s linear 13s;
    }

    .logo-frame-under {
      position: absolute;
      left: -15%;
      top: -8.45%;
      width: 124%;
      height: 132%;
      object-fit: contain;
      pointer-events: none;
      display: block;
      will-change: transform;
    }

    .logo-tv.risen .logo-frame-under-wrap {
      transform: translateY(-130%);
      opacity: 0;
    }

    .logo-tv.risen .logo-frame-under {
      animation: logo-tremor 0.14s ease-in-out infinite;
    }

    @keyframes logo-tremor {
      0%   { transform: translateX(0px) rotate(0deg); }
      20%  { transform: translateX(-0.9px) rotate(-0.06deg); }
      40%  { transform: translateX(0.8px) rotate(0.05deg); }
      60%  { transform: translateX(-0.7px) rotate(-0.04deg); }
      80%  { transform: translateX(0.6px) rotate(0.03deg); }
      100% { transform: translateX(0px) rotate(0deg); }
    }

    @media (max-width: 1100px) {
      body { padding: 12px; }

      .site {
        width: 100%;
        aspect-ratio: auto;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .center-logo,
      .center-album,
      .center-tracklist,
      .tour-stage.left,
      .tour-stage.right {
        position: relative;
        left: auto;
        right: auto;
        top: auto;
        transform: none;
        margin-inline: auto;
      }

      .center-logo {
        width: min(70vw, 420px);
        margin-top: 20px;
      }

      .center-album {
        width: min(60vw, 360px);
        margin-top: 50px;
      }

      .center-tracklist {
        width: min(60vw, 360px);
        margin-top: 18px;
        margin-bottom: 8px;
      }

      .tour-stage.left,
      .tour-stage.right {
        width: min(92vw, 760px);
      }

      .tour-stage.left { margin-top: 0px; }
      .tour-stage.right {
        margin-top: -6.5%;
        margin-bottom: 0px;
      }
    }
  </style>
</head>

  <script>
    const site = document.getElementById('site');
    const hitboxes = [...document.querySelectorAll('.hitbox')];
    const globalOverlay = document.getElementById('globalOverlay');

    const criticalImages = [
      'TOUR DATES.png',
      'TOUR DATES 2.png',
      'COVER ART.jpg',
      'tracklist.png',
      'FRAME.png',
      'LOGO.png'
    ];

    function preloadImage(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.decoding = 'async';
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = src;
      });
    }

    async function prepareSite() {
      await Promise.all(criticalImages.map(preloadImage));
      site.classList.add('is-ready');
    }

    prepareSite();

    const hideOverlay = () => {
      globalOverlay.classList.remove('visible');
      globalOverlay.removeAttribute('src');
    };

    const showOverlay = (box) => {
      const src = box.dataset.overlaySrc;
      if (!src) return;

      const stage = box.closest('.tour-stage');
      const stageRect = stage.getBoundingClientRect();

      const overlayLeft = parseFloat(box.dataset.overlayLeft || '0');
      const overlayTop = parseFloat(box.dataset.overlayTop || '0');
      const overlayWidth = parseFloat(box.dataset.overlayWidth || '100');
      const overlayHeight = parseFloat(box.dataset.overlayHeight || '100');

      globalOverlay.src = src;
      globalOverlay.style.left = `${stageRect.left + (overlayLeft / 100) * stageRect.width}px`;
      globalOverlay.style.top = `${stageRect.top + (overlayTop / 100) * stageRect.height}px`;
      globalOverlay.style.width = `${(overlayWidth / 100) * stageRect.width}px`;
      globalOverlay.style.height = `${(overlayHeight / 100) * stageRect.height}px`;
      globalOverlay.classList.add('visible');
    };

    hitboxes.forEach((box) => {
      box.addEventListener('mouseenter', () => showOverlay(box));
      box.addEventListener('mouseleave', hideOverlay);
      box.addEventListener('focus', () => showOverlay(box));
      box.addEventListener('blur', hideOverlay);
      box.addEventListener('click', () => {
        const url = box.dataset.url;
        if (url) {
          window.location.href = url;
        }
      });
    });

    window.addEventListener('resize', hideOverlay);
    window.addEventListener('scroll', hideOverlay);

    const logoWrap = document.getElementById('logoWrap');
    const logoVid = document.getElementById('logoVid');
    const logoTv = document.getElementById('logoTv');
    const logoRgb = document.getElementById('logoRgb');
    const logoRgbCtx = logoRgb.getContext('2d', { alpha: false });
    const logoFx = document.getElementById('logoFx');
    const logoFxCtx = logoFx.getContext('2d', { alpha: true });

    function logoRand(min, max) { return min + Math.random() * (max - min); }

    function logoResize() {
      const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      const rect = logoWrap.getBoundingClientRect();
      const w = Math.max(1, rect.width);
      const h = Math.max(1, rect.height);

      logoRgb.width = Math.floor(w * dpr);
      logoRgb.height = Math.floor(h * dpr);
      logoRgb.style.width = w + 'px';
      logoRgb.style.height = h + 'px';
      logoRgbCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

      logoFx.width = Math.floor(w * dpr);
      logoFx.height = Math.floor(h * dpr);
      logoFx.style.width = w + 'px';
      logoFx.style.height = h + 'px';
      logoFxCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    window.addEventListener('resize', logoResize);
    new ResizeObserver(logoResize).observe(logoWrap);
    logoResize();
    logoVid.load();

    let logoCaBase = 2.0;
    let logoCaWobble = 1.2;
    let logoBurstStrength = 0;
    const LOGO_WARM_TINT = 'rgb(255, 200, 120)';
    const LOGO_AQUA_TINT = 'rgb(120, 255, 220)';
    let logoCaBurstFrames = 0;
    let logoBurstSkew = 0;
    let logoPulseFrames = 0;
    let logoJitterHold = 0;
    let logoJitterY = 0;
    let logoAnimationStarted = false;
    let logoStartRequested = false;

    function logoCoverDraw(vw, vh, w, h) {
      return { dx: 0, dy: 0, dw: w, dh: h };
    }

    function drawLogoRGB(t, w, h) {
      const vw = logoVid.videoWidth || 1920;
      const vh = logoVid.videoHeight || 1080;
      const { dx, dy, dw, dh } = logoCoverDraw(vw, vh, w, h);

      if (logoCaBurstFrames <= 0 && Math.random() < 0.018) {
        logoCaBurstFrames = Math.floor(logoRand(10, 22));
        logoBurstStrength = logoRand(10, 22);
        logoBurstSkew = logoRand(-10, 10);
      }

      let strength = logoCaBase + Math.sin(t * 0.75) * 0.7;
      if (logoCaBurstFrames > 0) {
        strength += logoBurstStrength;
        logoBurstStrength *= 0.86;
        logoBurstSkew *= 0.86;
        logoCaBurstFrames--;
      }

      const jx = (Math.random() - 0.5) * logoCaWobble;
      const jy = (Math.random() - 0.5) * (logoCaWobble * 0.35);
      const skewX = (logoCaBurstFrames > 0) ? logoBurstSkew : 0;

      logoRgbCtx.clearRect(0, 0, w, h);

      logoRgbCtx.globalCompositeOperation = 'source-over';
      logoRgbCtx.globalAlpha = 1;
      logoRgbCtx.filter = 'none';
      logoRgbCtx.save();
      logoRgbCtx.translate(w / 2, h / 2);
      logoRgbCtx.transform(1, 0.012, 0.02, 1, 0, 0);
      logoRgbCtx.translate(-w / 2, -h / 2);
      logoRgbCtx.drawImage(logoVid, dx + skewX * 0.15, dy, dw, dh);
      logoRgbCtx.restore();

      logoRgbCtx.globalCompositeOperation = 'screen';

      logoRgbCtx.save();
      logoRgbCtx.translate(w / 2, h / 2);
      logoRgbCtx.transform(1, 0.012, 0.02, 1, 0, 0);
      logoRgbCtx.translate(-w / 2, -h / 2);
      logoRgbCtx.globalAlpha = (logoCaBurstFrames > 0) ? 0.46 : 0.28;
      logoRgbCtx.drawImage(logoVid, dx + strength + jx + skewX * 0.45, dy + jy, dw, dh);
      logoRgbCtx.globalCompositeOperation = 'multiply';
      logoRgbCtx.fillStyle = LOGO_WARM_TINT;
      logoRgbCtx.fillRect(0, 0, w, h);
      logoRgbCtx.restore();

      logoRgbCtx.save();
      logoRgbCtx.translate(w / 2, h / 2);
      logoRgbCtx.transform(1, 0.012, 0.02, 1, 0, 0);
      logoRgbCtx.translate(-w / 2, -h / 2);
      logoRgbCtx.globalCompositeOperation = 'screen';
      logoRgbCtx.globalAlpha = (logoCaBurstFrames > 0) ? 0.38 : 0.22;
      logoRgbCtx.drawImage(logoVid, dx - strength - jx - skewX * 0.35, dy - jy, dw, dh);
      logoRgbCtx.globalCompositeOperation = 'multiply';
      logoRgbCtx.fillStyle = LOGO_AQUA_TINT;
      logoRgbCtx.fillRect(0, 0, w, h);
      logoRgbCtx.restore();

      if (Math.random() < 0.30) {
        logoRgbCtx.save();
        logoRgbCtx.globalCompositeOperation = 'lighter';
        logoRgbCtx.globalAlpha = 0.05;
        logoRgbCtx.filter = 'blur(1px)';
        logoRgbCtx.drawImage(logoRgb, 0, 0, w, h);
        logoRgbCtx.restore();
      }
    }

    function drawLogoFX(t, w, h) {
      logoFxCtx.clearRect(0, 0, w, h);

      logoFxCtx.globalCompositeOperation = 'source-over';
      logoFxCtx.fillStyle = 'rgba(0,0,0,0.14)';
      const drift = Math.sin(t * 0.7) * 1.2;
      for (let y = 0; y < h; y += 3) {
        logoFxCtx.fillRect(0, y + drift, w, 1);
      }

      logoFxCtx.globalCompositeOperation = 'lighter';
      const count = Math.floor((w * h) / 13000);
      logoFxCtx.fillStyle = 'rgba(255,255,255,0.22)';
      for (let i = 0; i < count; i++) {
        logoFxCtx.fillRect(Math.random() * w, Math.random() * h, 1, 1);
      }

      const barH = Math.max(20, h * 0.07);
      const y0 = h - barH - (Math.sin(t * 3.0) * 2.0);
      logoFxCtx.globalCompositeOperation = 'overlay';
      for (let i = 0; i < 95; i++) {
        const yy = y0 + Math.random() * barH;
        const xShift = Math.sin(t * 10 + yy * 0.2) * 6 + logoRand(-4, 4);
        logoFxCtx.fillStyle = 'rgba(255,255,255,0.08)';
        logoFxCtx.fillRect(xShift, yy, w, 1);
      }

      if (Math.random() < 0.05) {
        logoFxCtx.globalCompositeOperation = 'lighter';
        logoFxCtx.fillStyle = 'rgba(255,255,255,0.10)';
        const tearY = y0 - logoRand(10, 45);
        logoFxCtx.fillRect(logoRand(-20, 20), tearY, w + 40, 2);
      }
    }

    function logoTick(ms) {
      const t = ms / 1000;
      const rect = logoWrap.getBoundingClientRect();
      const w = Math.max(1, rect.width);
      const h = Math.max(1, rect.height);

      if (logoVid.readyState >= 2) {
        if (logoJitterHold <= 0 && Math.random() < 0.085) {
          logoJitterHold = Math.floor(logoRand(3, 9));
          logoJitterY = logoRand(-3.2, 3.2);
        }
        if (logoJitterHold > 0) {
          logoJitterY *= 0.85;
          logoJitterHold--;
        } else {
          logoJitterY = 0;
        }
        document.documentElement.style.setProperty('--logo-jitterY', logoJitterY.toFixed(2) + 'px');

        if (logoPulseFrames <= 0 && Math.random() < 0.008) {
          logoPulseFrames = 12;
        }
        let pulse = 0;
        if (logoPulseFrames > 0) {
          pulse = Math.sin((logoPulseFrames / 12) * Math.PI);
          logoPulseFrames--;
        }
        document.documentElement.style.setProperty('--logo-pulse', pulse.toFixed(3));

        drawLogoRGB(t, w, h);
        drawLogoFX(t, w, h);
      }

      requestAnimationFrame(logoTick);
    }

    function beginLogoAnimation() {
      if (logoAnimationStarted) return;
      logoAnimationStarted = true;

      logoTv.classList.add('risen');

      const startTickOnce = () => {
        requestAnimationFrame(logoTick);
      };

      logoVid.currentTime = 0;
      logoVid.playsInline = true;
      logoVid.muted = false;

      Promise.resolve(logoVid.play())
        .then(() => {
          startTickOnce();
        })
        .catch((err) => {
          console.warn('Video playback failed:', err);
        });
    }

    function startLogoPlayback() {
      if (logoStartRequested) return;
      logoStartRequested = true;

      const startWhenReady = () => {
        beginLogoAnimation();
      };

      if (logoVid.readyState >= 2) {
        startWhenReady();
      } else {
        logoVid.load();
        logoVid.addEventListener('canplay', startWhenReady, { once: true });
      }
    }

    function handleLogoPress(event) {
      event.preventDefault();
      startLogoPlayback();
    }

    logoTv.addEventListener('click', handleLogoPress, { passive: false });
    logoTv.addEventListener('touchend', handleLogoPress, { passive: false });
  </script>
</body>
</html>
